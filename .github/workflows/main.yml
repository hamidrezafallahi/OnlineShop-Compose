name: Build and Push Docker Images

on:
  push:
    branches:
      - master

jobs:
  # مرحله اول: تشخیص تغییرات
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'FrontEnd/**'
            backend:
              - 'BackEnd/**'

  # مرحله دوم: ساخت ایمیج فرانت‌اند (فقط در صورت تغییر)
  build-frontend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FrontEnd image
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd
          file: ./FrontEnd/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shop-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/shop-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/shop-frontend:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # استفاده از BuildKit برای ساخت سریع‌تر
          provenance: false
          sbom: false

  # مرحله سوم: ساخت ایمیج بک‌اند (فقط در صورت تغییر)
  build-backend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push BackEnd image
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd
          file: ./BackEnd/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shop-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/shop-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/shop-backend:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # استفاده از BuildKit برای ساخت سریع‌تر
          provenance: false
          sbom: false
