services:

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    volumes:
          - sql_data:/var/opt/mssql
    networks:
      - shop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Only expose this to the host if you need to connect from outside
    # (e.g. SSMS/Azure Data Studio on your own machine). Remove in a locked-down prod setup.
    ports:
      - "1433:1433"

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      sql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=OnlineShopDb;User Id=sa;Password=${SQL_SA_PASSWORD};MultipleActiveResultSets=true;Encrypt=false;TrustServerCertificate=true"
      ConnectionStrings__HangfireConnection: "Server=sql,1433;Database=HangfireDb;User Id=sa;Password=${SQL_SA_PASSWORD};MultipleActiveResultSets=true;Encrypt=false;TrustServerCertificate=true"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "OnlineShop"
      Jwt__Audience: "OnlineShopUsers"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shop-network
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Not published to the host on purpose - only the frontend/nginx should
    # reach it over the internal network. Add "ports: - 8080:8080" temporarily
    # if you want to hit the API directly for debugging.

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
      INTERNAL_API_URL: "${INTERNAL_API_URL}"
      API_URL: "${API_URL}"
    networks:
      - shop-network
    restart: unless-stopped

networks:
  shop-network:

volumes:
  sql_data: