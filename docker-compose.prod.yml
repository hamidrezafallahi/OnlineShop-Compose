version: "3.8"

# =============================================================================
# Production Environment
# =============================================================================
# Run: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ─── SQL Server ────────────────────────────────────────────────────────────
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shop-sql-prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: Standard
    volumes:
      - sql_data_prod:/var/opt/mssql
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── Backend (ASP.NET) ──────────────────────────────────────────────────────
  backend:
    # استفاده از ایمیج ساخته شده در داکر هاب
    image: ${DOCKER_USERNAME}/shop-backend:${BACKEND_TAG:-latest}
    # build:  # کامنت شده - دیگر نیازی به ساخت محلی نیست
    #   context: ./BackEnd
    #   dockerfile: Dockerfile.prod
    container_name: shop-backend-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=sql,1433;
        Database=OnlineShopDb;
        User Id=sa;
        Password=${SQL_SA_PASSWORD};
        Encrypt=false;
        TrustServerCertificate=true;
        MultipleActiveResultSets=false
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers
    volumes:
      - uploads_prod:/app/wwwroot/uploads
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Security: read-only root filesystem (with writable temp)
    # read_only: true
    # tmpfs:
    #   - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    # استفاده از ایمیج ساخته شده در داکر هاب
    image: ${DOCKER_USERNAME}/shop-frontend:${FRONTEND_TAG:-latest}
    # build:  # کامنت شده - دیگر نیازی به ساخت محلی نیست
    #   context: ./FrontEnd
    #   dockerfile: Dockerfile.prod
    container_name: shop-frontend-prod
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN_NAME}/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://${DOMAIN_NAME}}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shop-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ─── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: shop-nginx-prod
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.3"

  # ─── Certbot (SSL auto-renewal) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: shop-certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt:rw
      - ./docker/certbot/www:/var/www/certbot:rw
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ─── FTP Server ────────────────────────────────────────────────────────────
  # ftp:
    # build:
    #   context: ./docker/ftp
    # container_name: shop-ftp-prod
    # environment:
    #   FTP_USER: ${FTP_USER:-shopftp}
    #   FTP_PASSWORD: ${FTP_PASSWORD}
    #   PASV_ADDRESS: ${DOMAIN_NAME}
    #   PASV_MIN_PORT: 21100
    #   PASV_MAX_PORT: 21110
    # ports:
    #   - "21:21"
    #   - "21100-21110:21100-21110"
    # volumes:
    #   - ftp_data_prod:/home/vsftpd
    #   - uploads_prod:/home/vsftpd/uploads:ro
    # networks:
    #   - shop-network-prod
    # restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "nc", "-z", "localhost", "21"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s

networks:
  shop-network-prod:
    name: shop-network-prod
    driver: bridge

volumes:
  sql_data_prod:
    name: shop-sql-data-prod
  uploads_prod:
    name: shop-uploads-prod
  # ftp_data_prod:
  #   name: shop-ftp-data-prod