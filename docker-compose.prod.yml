# =============================================================================
# Production Environment
# =============================================================================
# Run: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-OnlineShopDb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-OnlineShopDb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 512M
  # ─── Backend (ASP.NET) ──────────────────────────────────────────────────────
  backend:
    # استفاده از ایمیج ساخته شده در داکر هاب
    image: hamidrezafalahi/shop-backend:latest
    # build:  # کامنت شده - دیگر نیازی به ساخت محلی نیست
    #   context: ./BackEnd
    #   dockerfile: Dockerfile.prod
    container_name: shop-backend-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-OnlineShopDb};
        Username=${POSTGRES_USER:-postgres};
        Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers
    volumes:
      - uploads_prod:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Security: read-only root filesystem (with writable temp)
    # read_only: true
    # tmpfs:
    #   - /tmp
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    # استفاده از ایمیج ساخته شده در داکر هاب
    image: hamidrezafalahi/shop-frontend:latest
    # build:  # کامنت شده - دیگر نیازی به ساخت محلی نیست
    #   context: ./FrontEnd
    #   dockerfile: Dockerfile.prod
    container_name: shop-frontend-prod
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN_NAME}/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://${DOMAIN_NAME}}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shop-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
  # ─── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: shop-nginx-prod
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    environment:
      - TZ=Asia/Tehran
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - uploads_prod:/var/www/uploads:ro
      - nginx-cache:/data/nginx/cache
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      certbot_init:
        condition: service_completed_successfully
    networks:
      - shop-network-prod
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.3"
  # ─── Certbot (SSL auto-renewal) ───────────────────────────────────────────
  certbot_init:
    container_name: shop-certbot-init
    image: certbot/certbot:latest
    environment:
      DOMAIN: ${DOMAIN_NAME}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    ports:
      - "80:80"
    command: >-
      certonly --webroot --webroot-path=/var/www/certbot --preferred-challenges http
      -d ${DOMAIN_NAME} -m ${CERTBOT_EMAIL} --agree-tos --non-interactive
      --keep-until-expiring -vvv
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - shop-network-prod
    restart: "no"
  certbot_renew:
    image: certbot/certbot:latest
    container_name: shop-certbot-renew
    depends_on:
      certbot_init:
        condition: service_completed_successfully
    entrypoint: /bin/sh
    command: -c "while :; do certbot renew --webroot -w /var/www/certbot; sleep ${RENEW_INTERVAL:-12h}; done"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - shop-network-prod
    restart: unless-stopped
  nginx_reloader:
    image: alpine:3.20
    container_name: nginx_reloader
    depends_on:
      - nginx
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shop-network-prod
    command: >
      sh -c '
        apk add --no-cache inotify-tools docker-cli >/dev/null;
        while :; do
          inotifywait -e create,modify,delete,move -r /etc/letsencrypt/live >/dev/null 2>&1;
          echo "certs changed: reloading nginx";
          docker kill -s HUP shop-nginx-prod >/dev/null 2>&1 || true;
        done
      '
    restart: unless-stopped
  # ─── pgAdmin ──────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shop-pgadmin-prod
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data_prod:/var/lib/pgadmin
    networks:
      - shop-network-prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
# ─── Portainer ────────────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: shop-portainer-prod
    command: -H unix:///var/run/docker.sock
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data_prod:/data
    networks:
      - shop-network-prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
networks:
  shop-network-prod:
    name: shop-network-prod
    driver: bridge
volumes:
  postgres_data_prod:
    name: shop-postgres-data-prod
  uploads_prod:
    name: shop-uploads-prod
  pgadmin_data_prod:
    name: shop-pgadmin-data-prod
  portainer_data_prod:
    name: shop-portainer-data-prod
  letsencrypt:
    name: onlineshop-compose_letsencrypt
  certbot-webroot:
    name: shop-certbot-webroot-prod
  nginx-cache:
    name: shop-nginx-cache-prod
  nginx-logs: