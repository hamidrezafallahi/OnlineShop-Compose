services:

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    volumes:
          - sql_data:/var/opt/mssql
    stop_grace_period: 1m  
    networks:

      - shop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=sql,1433;
        Database=OnlineShopDb;
        User Id=sa;
        Password=${SQL_SA_PASSWORD};
        Encrypt=false;
        TrustServerCertificate=true
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.prod
    stop_grace_period: 30s  
    volumes:
      - uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - shop-network
    restart: unless-stopped
    expose:
      - "8080"
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.prod
      
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    environment:
       INTERNAL_API_URL: "${INTERNAL_API_URL}"
    networks:
      - shop-network
    restart: unless-stopped
  nginx:
    image: nginx:1.28-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - shop-network
    restart: unless-stopped
networks:
  shop-network:

volumes:
  sql_data:
  uploads: