# =============================================================================
# Development Environment
# =============================================================================
# Run:
# docker compose -f docker-compose.dev.yml up -d
# =============================================================================

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres-dev

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-OnlineShopDb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - shop-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-OnlineShopDb}"
        ]


  # ─── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.dev

    container_name: shop-backend-dev

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: >
        Host=postgres;
        Port=5432;
        Database=${POSTGRES_DB:-OnlineShopDb};
        Username=${POSTGRES_USER:-postgres};
        Password=${POSTGRES_PASSWORD:-postgres}

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers


    volumes:
      # Hot reload source
      - ./BackEnd:/src

      # Upload persistence
      - uploads:/src/Api/wwwroot/uploads

      # Keep build artifacts isolated
      - backend_api_bin:/src/Api/bin
      - backend_api_obj:/src/Api/obj

      - backend_application_bin:/src/Application/bin
      - backend_application_obj:/src/Application/obj

      - backend_infrastructure_bin:/src/Infrastructure/bin
      - backend_infrastructure_obj:/src/Infrastructure/obj

      - backend_domain_bin:/src/Domain/bin
      - backend_domain_obj:/src/Domain/obj

      - backend_common_bin:/src/Common/bin
      - backend_common_obj:/src/Common/obj


    depends_on:
      postgres:
        condition: service_healthy


    networks:
      - shop-network


    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8080/health || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s



  # ─── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.dev

    container_name: shop-frontend-dev

    ports:
      - "3000:3000"

    environment:
      INTERNAL_API_URL: "${INTERNAL_API_URL:-http://backend:8080}"

    volumes:
      - ./FrontEnd:/app
      - /app/node_modules

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - shop-network



  # ─── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine

    container_name: shop-nginx-dev

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      backend:
        condition: service_healthy

      frontend:
        condition: service_started

    networks:
      - shop-network



  # ─── pgAdmin ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest

    container_name: shop-pgadmin-dev

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - shop-network



networks:
  shop-network:


volumes:

  postgres_data:

  uploads:

  pgadmin_data:


  backend_api_bin:
  backend_api_obj:

  backend_application_bin:
  backend_application_obj:

  backend_infrastructure_bin:
  backend_infrastructure_obj:

  backend_domain_bin:
  backend_domain_obj:

  backend_common_bin:
  backend_common_obj: