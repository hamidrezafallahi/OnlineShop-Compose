# =============================================================================
# Development Environment
# =============================================================================
# Run: docker compose -f docker-compose.dev.yml up -d
# This will start all services with hot-reload support.
# =============================================================================

services:
  # ─── SQL Server ────────────────────────────────────────────────────────────
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shop-sql-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - shop-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.dev
    container_name: shop-backend-dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=sql;
        Database=OnlineShopDb;
        User Id=sa;
        Password=${SQL_SA_PASSWORD};
        Encrypt=false;
        TrustServerCertificate=true;
        MultipleActiveResultSets=true
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers
    volumes:
      # Mount source code for hot-reload
      - ./BackEnd:/src
      # Named volume for uploads
      - uploads:/src/Api/wwwroot/uploads
      # Exclude build artifacts from the mounted source
      - /src/**/bin
      - /src/**/obj
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - shop-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.dev
    container_name: shop-frontend-dev
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: "${INTERNAL_API_URL:-http://backend:8080}"
    volumes:
      - ./FrontEnd:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shop-network

  nginx:
    image: nginx:1.27-alpine
    container_name: shop-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - shop-network

networks:
  shop-network:

volumes:
  sql_data:
  uploads:



