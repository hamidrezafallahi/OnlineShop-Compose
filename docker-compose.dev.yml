version: "3.8"

# =============================================================================
# Development Environment
# =============================================================================
# Run: docker compose -f docker-compose.dev.yml up -d
# This will start all services with hot-reload support.
# =============================================================================

services:
  # ─── SQL Server ────────────────────────────────────────────────────────────
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shop-sql-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data_dev:/var/opt/mssql
    networks:
      - shop-network-dev
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Backend (ASP.NET) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.dev
    container_name: shop-backend-dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=sql;
        Database=OnlineShopDb;
        User Id=sa;
        Password=${SQL_SA_PASSWORD};
        Encrypt=false;
        TrustServerCertificate=true;
        MultipleActiveResultSets=true
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: OnlineShop
      Jwt__Audience: OnlineShopUsers
    volumes:
      # Mount source code for hot-reload
      - ./BackEnd:/src
      # Named volume for uploads
      - uploads_dev:/src/Api/wwwroot/uploads
      # Exclude build artifacts from the mounted source
      - /src/**/bin
      - /src/**/obj
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - shop-network-dev
    restart: unless-stopped

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.dev
    container_name: shop-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      WATCHPACK_POLLING: "true"
    volumes:
      # Mount source code for hot-reload
      - ./FrontEnd:/app
      # Exclude node_modules from mounted source
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
    networks:
      - shop-network-dev
    restart: unless-stopped

  # ─── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: shop-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - shop-network-dev
    restart: unless-stopped

  # ─── FTP Server ────────────────────────────────────────────────────────────
  ftp:
    build:
      context: ./docker/ftp
    container_name: shop-ftp-dev
    environment:
      FTP_USER: ${FTP_USER:-shopftp}
      FTP_PASSWORD: ${FTP_PASSWORD:-FtpSecurePass123!}
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ftp_data_dev:/home/vsftpd
    networks:
      - shop-network-dev
    restart: unless-stopped

networks:
  shop-network-dev:
    name: shop-network-dev
    driver: bridge

volumes:
  sql_data_dev:
    name: shop-sql-data-dev
  uploads_dev:
    name: shop-uploads-dev
  ftp_data_dev:
    name: shop-ftp-data-dev